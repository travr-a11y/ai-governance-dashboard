    // ─── CSV Parser ───────────────────────────────────────────────────────────────

    function parseCSVLine(line) {
      const out = [];
      let cur = "";
      let inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === "\"") { inQ = !inQ; continue; }
        if (c === "," && !inQ) { out.push(cur.trim()); cur = ""; continue; }
        cur += c;
      }
      out.push(cur.trim());
      return out.map(s => s.replace(/^"|"$/g, ""));
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return { data: [], errors: ["File appears empty"] };
      const headers = parseCSVLine(lines[0].replace(/^\uFEFF/, "")).map(h => h.trim());
      const required = ["user_email","model","product","total_requests","total_prompt_tokens","total_completion_tokens","total_net_spend_usd"];
      const missing = required.filter(r => !headers.includes(r));
      if (missing.length > 0) return { data: [], errors: [`Missing columns: ${missing.join(", ")}`] };
      const data = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const vals = parseCSVLine(lines[i]);
        const row = {};
        headers.forEach((h, idx) => { row[h] = vals[idx] ?? ""; });
        ["total_requests","total_prompt_tokens","total_completion_tokens","total_net_spend_usd","total_gross_spend_usd"].forEach(f => { row[f] = parseFloat(row[f]) || 0; });
        data.push(row);
      }
      return { data, errors: [] };
    }

    function canonicalUserEmail(raw) {
      if (!raw) return null;

      return found || raw;
    }

    function parseConversationsFile(text) {
      try {
        const root = JSON.parse(text);
        const list = Array.isArray(root) ? root : (root.conversations || root.data || []);
        const items = [];
        for (const c of list) {
          const acc = c.account?.uuid || c.account_uuid || c.accountUuid;
          const msgs = c.chat_messages || c.messages || [];
          const messageCount = Array.isArray(msgs) ? msgs.length : (parseInt(c.message_count, 10) || 0);
          items.push({
            accountUuid: acc,
            name: String(c.name || "Untitled").slice(0, 240),
            messageCount,
            created_at: c.created_at,
            updated_at: c.updated_at || c.updatedAt,
          });
        }
        return { items, errors: [] };
      } catch (e) {
        return { items: [], errors: [String(e.message || e)] };
      }
    }

    function parseProjectsFile(text) {

          const docs = p.docs || p.documents || [];

    function parseUsersFile(text) {
      try {
        const root = JSON.parse(text);
        const list = Array.isArray(root) ? root : (root.users || root.data || []);
        const map = {};
        const metaByEmail = {};
        for (const u of list) {
          const uuid = u.uuid || u.id;
          const emailRaw = (u.email_address || u.email || "").trim();
          if (!uuid || !emailRaw) continue;
          const email = canonicalUserEmail(emailRaw);
          map[uuid] = email;
          const phone = u.verified_phone_number || u.phone || u.verifiedPhone;
          metaByEmail[email] = {
            phoneVerified: !!(phone && String(phone).length > 2),
            fullName: u.full_name || u.fullName || "",
          };
        }
        return { map, metaByEmail, errors: [] };
      } catch (e) {
        return { map: {}, metaByEmail: {}, errors: [String(e.message || e)] };
      }
    }

    function parseCodeCSV(text) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) return { row: null, errors: ["File appears empty"] };
      const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase());
      const idxUser = headers.findIndex(h => h === "user" || h.includes("email"));
      const idxSpend = headers.findIndex(h => h.includes("spend"));
      const idxLines = headers.findIndex(h => h.includes("line"));
      if (idxUser < 0 || idxSpend < 0 || idxLines < 0) {
        return { row: null, errors: ["Expected columns: User, Spend this Month (USD), Lines this Month"] };
      }
      const vals = parseCSVLine(lines[1]);
      const userCell = vals[idxUser] || "";
      const spendStr = (vals[idxSpend] || "").replace(/[$,]/g, "");
      const linesStr = (vals[idxLines] || "").replace(/,/g, "");
      const spendUsd = parseFloat(spendStr) || 0;
      const codeLines = parseInt(linesStr, 10) || 0;
      const email = canonicalUserEmail(userCell);
      return { row: { email, spendUsd, codeLines }, errors: [] };
    }

    /**
     * Parse the new Claude API token export CSV.
     * Filters to rows where workspace === "Claude Code".
     * Returns { row: { email, spendUsd, totalTokens, totalInputTokens, totalOutputTokens, modelBreakdown, usageRowCount }, errors }
     */
    function parseCodeApiCSV(text) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) return { row: null, errors: ["File appears empty"] };

      const headers = parseCSVLine(lines[0].replace(/^\uFEFF/, "")).map(h => h.toLowerCase().trim());
      const col = name => headers.indexOf(name);

      const iModel     = col("model_version");
      const iWorkspace = col("workspace");
      const iInNoCache = col("usage_input_tokens_no_cache");
      const iInCW5     = col("usage_input_tokens_cache_write_5m");
      const iInCW1h    = col("usage_input_tokens_cache_write_1h");
      const iInCR      = col("usage_input_tokens_cache_read");
      const iOut       = col("usage_output_tokens");

      if ([iModel, iWorkspace, iOut].some(i => i < 0)) {
        return { row: null, errors: ["Missing required columns: model_version, workspace, usage_output_tokens"] };
      }

      let totalSpendUsd = 0;
      let totalInputTokens = 0;
      let totalOutputTokens = 0;
      const modelBreakdown = {};
      let usageRowCount = 0;

      const cellInt = (vals, idx) => {
        if (idx < 0) return 0;
        return parseInt(vals[idx] || "0", 10) || 0;
      };

      for (let i = 1; i < lines.length; i++) {
        const vals = parseCSVLine(lines[i]);
        const workspace = (vals[iWorkspace] || "").trim();
        if (workspace !== "Claude Code") continue;

        usageRowCount++;
        const model        = (vals[iModel] || "").trim();
        const inNoCache    = cellInt(vals, iInNoCache);
        const inCW5        = cellInt(vals, iInCW5);
        const inCW1h       = cellInt(vals, iInCW1h);
        const inCR         = cellInt(vals, iInCR);
        const outTokens    = cellInt(vals, iOut);

        const p = codeModelPrice(model);
        const rowSpend = (
          (inNoCache / 1e6) * p.in  +
          (inCW5     / 1e6) * p.cw  +
          (inCW1h    / 1e6) * p.cw  +
          (inCR      / 1e6) * p.cr  +
          (outTokens / 1e6) * p.out
        );

        totalSpendUsd     += rowSpend;
        totalInputTokens  += inNoCache + inCW5 + inCW1h + inCR;
        totalOutputTokens += outTokens;

        const tier = MODEL_CLASS[model] || (model.toLowerCase().includes("opus") ? "Opus"
                                     : model.toLowerCase().includes("haiku") ? "Haiku" : "Sonnet");
        if (!modelBreakdown[tier]) modelBreakdown[tier] = { tokens: 0, spend: 0 };
        modelBreakdown[tier].tokens += inNoCache + inCW5 + inCW1h + inCR + outTokens;
        modelBreakdown[tier].spend  += rowSpend;
      }

      return {
        row: {
          email: "trowley@frankadvisory.com.au",
          spendUsd: totalSpendUsd,
          totalTokens: totalInputTokens + totalOutputTokens,
          totalInputTokens,
          totalOutputTokens,
          modelBreakdown,
          usageRowCount,
        },
        errors: [],
      };
    }

    /** Distinguish Anthropic admin CSV from Claude Code team CSV by header row only. */
    function sniffCsvKind(text) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      if (lines.length < 1) return "unknown";
      const headers = parseCSVLine(lines[0].replace(/^\uFEFF/, "")).map(h => h.trim().toLowerCase().replace(/^"|"$/g, ""));
      const anthropicRequired = ["user_email","model","product","total_requests","total_prompt_tokens","total_completion_tokens","total_net_spend_usd"];
      if (anthropicRequired.every(r => headers.includes(r))) return "anthropic";
      const newCodeRequired = ["usage_date_utc", "model_version", "workspace", "usage_output_tokens"];
      if (newCodeRequired.every(r => headers.includes(r))) return "code-api";
      const idxUser = headers.findIndex(h => h === "user" || h.includes("email"));
      const idxSpend = headers.findIndex(h => h.includes("spend"));
      const idxLines = headers.findIndex(h => h.includes("line"));
      if (idxUser >= 0 && idxSpend >= 0 && idxLines >= 0) return "code";
      return "unknown";
    }

    function sanitizeFilenameForStorage(name) {
      const base = (name || "file").split(/[/\\]/).pop() || "file";
      const cleaned = base.replace(/[^a-zA-Z0-9._-]+/g, "_").replace(/^\.+/, "");
      return (cleaned || "file").slice(0, 180);
    }

    /** Storage path: {YYYY-MM-DD}/{stem}_{timestamp}{ext} — avoids same-day name collisions. */
    function buildUploadStoragePath(file) {
      const d = new Date();
      const ymd = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      const safe = sanitizeFilenameForStorage(file.name);
      const dot = safe.lastIndexOf(".");
      const stem = dot > 0 ? safe.slice(0, dot) : safe;
      const ext = dot > 0 ? safe.slice(dot) : "";
      return `${ymd}/${stem}_${Date.now()}${ext}`;
    }

    /**
     * Parse one file's text and invoke ingest callbacks (same routing as Module 1).
     * @returns {{ errs: string[], fileType: string|null }} fileType for Supabase uploads row when successful.
     */
    function getIngestResult(file, text, handlers) {
      const {
        onData, onConvItems, onProjItems, onMemItems, onUsersOverlay, onCodeRow,
      } = handlers;
      const nm = (file.name || "").toLowerCase();
      const errs = [];
      let fileType = null;
      if (nm.endsWith(".json")) {
        if (nm.includes("conversation")) {
          const { items, errors } = parseConversationsFile(text);
          if (errors.length) errs.push(errors[0]);
          else { onConvItems(items, file.name); fileType = "conversations"; }
        } else if (nm.includes("project")) {
          const { items, errors } = parseProjectsFile(text);
          if (errors.length) errs.push(errors[0]);
          else { onProjItems(items, file.name); fileType = "projects"; }
        } else if (nm.includes("memor")) {
          const { items, errors } = parseMemoriesFile(text);
          if (errors.length) errs.push(errors[0]);
          else { onMemItems(items, file.name); fileType = "memories"; }
        } else if (nm.includes("user")) {
          const { map, metaByEmail, errors } = parseUsersFile(text);
          if (errors.length) errs.push(errors[0]);
          else { onUsersOverlay(map, metaByEmail, file.name); fileType = "users"; }
        } else {
          errs.push(`${file.name}: name must include conversation, project, memor, or user (e.g. conversations.json)`);
        }
        return { errs, fileType };
      }
      if (nm.endsWith(".csv")) {
        const kind = sniffCsvKind(text);
        if (kind === "anthropic") {
          const { data, errors } = parseCSV(text);
          if (errors.length) errs.push(errors[0]);
          else {
            const match = file.name.match(/(\d{4}-\d{2}-\d{2})[-_to]+(\d{4}-\d{2}-\d{2})/);
            const dateRange = match ? `${match[1]} to ${match[2]}` : "Unknown period";
            onData(data, file.name, dateRange);
            fileType = "anthropic-csv";
          }
        } else if (kind === "code-api") {
          const { row, errors } = parseCodeApiCSV(text);
          if (errors.length) errs.push(errors[0]);
          else if (!row) errs.push(`${file.name}: could not parse Claude Code API CSV`);
          else { onCodeRow(row, file.name); fileType = "code-csv"; }
        } else if (kind === "code") {
          const { row, errors } = parseCodeCSV(text);
          if (errors.length) errs.push(errors[0]);
          else if (!row || !row.email) errs.push(`${file.name}: could not parse Claude Code CSV row`);
          else { onCodeRow(row, file.name); fileType = "code-csv"; }
        } else {
          errs.push(`${file.name}: not Anthropic team CSV (needs user_email, model, product, …) nor Claude Code CSV (legacy: User, Spend, Lines; API: usage_date_utc, model_version, workspace, …)`);
        }
        return { errs, fileType };
      }
      errs.push(`${file.name}: use .csv or .json`);
      return { errs, fileType };
    }

    function saveAppSetting(supabaseClient, key, value) {
      if (!supabaseClient) return;
      supabaseClient
        .from("app_settings")
        .upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: "key" })
        .then(({ error }) => {
          if (error) console.warn(`app_settings upsert (${key}):`, error);
        });
    }

    async function sha256HexFromUtf8(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    /**
     * Persists raw file to Storage + uploads row (with content_hash). Global dedup: same bytes = skip.
     * Optional invokeRag(uploadId) runs Edge Function ingest-process (OpenRouter embeddings).
     */
    async function persistIngestToSupabase(supabase, userEmail, file, fileType, text, onDone, callbacks) {
      const { onDuplicate, invokeRag } = callbacks || {};
      try {
        const content_hash = await sha256HexFromUtf8(text);
        const { data: existing, error: qErr } = await supabase
          .from("uploads")
          .select("id,file_name")
          .eq("content_hash", content_hash)
          .maybeSingle();
        if (qErr) console.warn("uploads content_hash lookup:", qErr);
        if (existing) {
          if (onDuplicate) onDuplicate(file.name);
          if (onDone) onDone();
          return;
        }
        const path = buildUploadStoragePath(file);
        const { error: e1 } = await supabase.storage.from("uploads").upload(path, file, {
          contentType: file.type || "text/plain; charset=utf-8",
          upsert: false,
        });
        if (e1) {
          console.warn("Supabase storage upload failed:", e1);
          if (onDone) onDone();
          return;
        }
        const { data: inserted, error: e2 } = await supabase
          .from("uploads")
          .insert({
            file_name: file.name,
            file_type: fileType,
            storage_path: path,
            file_size: typeof file.size === "number" ? file.size : null,
            uploaded_by: userEmail || null,
            content_hash,
          })
          .select("id")
          .single();
        if (e2) {
          const dup = e2.code === "23505" || String(e2.message || "").toLowerCase().includes("duplicate");
          if (dup && onDuplicate) onDuplicate(file.name);
          else console.warn("Supabase uploads insert failed:", e2);
          const { error: rmErr } = await supabase.storage.from("uploads").remove([path]);
          if (rmErr) console.warn("Supabase storage rollback (orphan) failed:", rmErr);
          if (onDone) onDone();
          return;
        }
        if (inserted && inserted.id && typeof invokeRag === "function") {
          void invokeRag(inserted.id);
        }
      } catch (e) {
        console.warn("persistIngestToSupabase:", e);
      }
      if (onDone) onDone();
    }

    function computeConversationSignal(conv) {
      if (!conv || !conv.count) return 0;
      const countScore = Math.min(100, (conv.count / 50) * 100);
      const avg = conv.avgDepth || 0;
      let depthScore = 20;
      if (avg >= 10) depthScore = 100;
      else if (avg >= 6) depthScore = 75;
      else if (avg >= 3) depthScore = 50;
      else if (avg >= 2) depthScore = 35;
      const uniq = new Set(conv.names || []).size;
      const topicScore = Math.min(100, (uniq / Math.max(Math.min(conv.count, 20), 1)) * 100);
      let recencyScore = 40;
      if (conv.lastUpdate) {
        const days = (Date.now() - conv.lastUpdate.getTime()) / 86400000;
        if (days <= 7) recencyScore = 100;
        else if (days <= 14) recencyScore = 80;
        else if (days <= 30) recencyScore = 55;
        else recencyScore = 30;
      }
      return (countScore + depthScore + topicScore + recencyScore) / 4;
    }

    function computeProjectSignal(proj) {
      if (!proj || !proj.count) return 0;
      let s = 40;
      if (proj.customPrompts > 0) s += 30;
      if (proj.docCount >= 3) s += 20;
      else if (proj.docCount >= 1) s += 10;
      if (proj.privateCount > 0) s += 10;
      return Math.min(100, s);
    }

    function computeConfigSignal(mem, userMeta) {
      let s = 0;
      if (mem && mem.memoryLen > 0) s += 60;
      if (mem && mem.memoryLen > 2000) s += 20;
      if (userMeta && userMeta.phoneVerified) s += 20;
      return Math.min(100, s);
    }

    function buildBehaviorMaps(convItems, projItems, memItems, uuidMap, userMetaByEmail) {
      const convByEmail = {};
      const projByEmail = {};
      const memByEmail = {};

      for (const it of convItems || []) {
        const uuid = it.accountUuid;
        if (!uuid || !uuidMap[uuid]) continue;
        const em = canonicalUserEmail(uuidMap[uuid]);
        const key = LOWER_EMAIL_TO_KEY[em.toLowerCase()] || em;
        if (!convByEmail[key]) convByEmail[key] = { names: [], depths: [], lastUpdate: null, count: 0 };
        const bucket = convByEmail[key];
        bucket.count++;
        bucket.names.push(it.name);
        bucket.depths.push(it.messageCount || 0);
        const t = it.updated_at ? new Date(it.updated_at) : (it.created_at ? new Date(it.created_at) : null);
        if (t && !isNaN(t.getTime())) {
          if (!bucket.lastUpdate || t > bucket.lastUpdate) bucket.lastUpdate = t;
        }
      }
      Object.keys(convByEmail).forEach(k => {
        const b = convByEmail[k];
        const sum = b.depths.reduce((a, x) => a + x, 0);
        b.avgDepth = b.depths.length ? sum / b.depths.length : 0;
      });

      for (const p of projItems || []) {
        const uuid = p.creatorUuid;
        if (!uuid || !uuidMap[uuid]) continue;
        const em = canonicalUserEmail(uuidMap[uuid]);
        const key = LOWER_EMAIL_TO_KEY[em.toLowerCase()] || em;
        if (!projByEmail[key]) projByEmail[key] = { count: 0, customPrompts: 0, docCount: 0, privateCount: 0 };
        const b = projByEmail[key];
        b.count++;
        if (p.promptTemplate && String(p.promptTemplate).trim()) b.customPrompts++;
        b.docCount += p.docsCount || 0;
        if (p.isPrivate) b.privateCount++;
      }

      for (const m of memItems || []) {
        const uuid = m.accountUuid;
        if (!uuid || !uuidMap[uuid]) continue;
        const em = canonicalUserEmail(uuidMap[uuid]);
        const key = LOWER_EMAIL_TO_KEY[em.toLowerCase()] || em;
        memByEmail[key] = { memoryLen: m.memoryLen || 0 };
      }

      const hasBehaviorData = (convItems && convItems.length > 0);
      return { hasBehaviorData, convByEmail, projByEmail, memByEmail, userMetaByEmail: userMetaByEmail || {} };
    }

    // ─── Aggregation ──────────────────────────────────────────────────────────────

    function aggregateData(rows, audRate, behavior, codeRow, seatsOverride = null) {
      // Build lookup maps: prefer seatsOverride (from DB) when available, else fall back to hardcoded constants
      const usersMap = seatsOverride
        ? Object.fromEntries(seatsOverride.map(s => [s.email, {
            name: s.display_name, entity: s.entity, seatTier: s.seat_tier,
            spendLimit: s.spend_limit_aud, isBenchmark: s.is_benchmark,
          }]))
        : USERS_MAP;
      const lowerEmailToKey = Object.fromEntries(Object.keys(usersMap).map(k => [k.toLowerCase(), k]));
      const seatTierMap = seatsOverride
        ? Object.fromEntries(seatsOverride.map(s => [s.email, s.seat_tier]))
        : SEAT_TIERS;
      const spendLimitLower = seatsOverride
        ? Object.fromEntries(seatsOverride.map(s => [s.email.toLowerCase(), s.spend_limit_aud ?? undefined]))
        : SPEND_LIMIT_BY_LOWERCASE;
      const resolveSpendLimit = email => {
        if (!email) return undefined;
        const lower = String(email).toLowerCase();
        return Object.prototype.hasOwnProperty.call(spendLimitLower, lower) ? spendLimitLower[lower] : undefined;
      };

      const b = behavior || { hasBehaviorData: false, convByEmail: {}, projByEmail: {}, memByEmail: {}, userMetaByEmail: {} };
      const byUser = {};
      rows.forEach(row => {
        const emailRaw = row.user_email || "";
        const mapKey = lowerEmailToKey[emailRaw.toLowerCase()] || emailRaw;
        if (!byUser[mapKey]) {
          byUser[mapKey] = { email: mapKey, modelBreakdown: {}, productBreakdown: {}, totalSpendUSD: 0, totalPromptTokens: 0, totalCompletionTokens: 0, totalRequests: 0 };
        }
        const u = byUser[mapKey];
        u.totalSpendUSD         += row.total_net_spend_usd || 0;
        u.totalPromptTokens     += row.total_prompt_tokens || 0;
        u.totalCompletionTokens += row.total_completion_tokens || 0;
        u.totalRequests         += row.total_requests || 0;
        const cls = MODEL_CLASS[row.model] || "Other";
        if (!u.modelBreakdown[cls]) u.modelBreakdown[cls] = { spend:0, tokens:0, requests:0 };
        u.modelBreakdown[cls].spend    += row.total_net_spend_usd || 0;
        u.modelBreakdown[cls].tokens   += (row.total_prompt_tokens||0) + (row.total_completion_tokens||0);
        u.modelBreakdown[cls].requests += row.total_requests || 0;
        const prod = row.product || "Unknown";
        if (!u.productBreakdown[prod]) u.productBreakdown[prod] = { spend:0, tokens:0, requests:0 };
        u.productBreakdown[prod].spend    += row.total_net_spend_usd || 0;
        u.productBreakdown[prod].tokens   += (row.total_prompt_tokens||0) + (row.total_completion_tokens||0);
        u.productBreakdown[prod].requests += row.total_requests || 0;
      });

      const presentEmailsLower = new Set(Object.keys(byUser).map(e => e.toLowerCase()));
      Object.keys(usersMap).forEach(k => {
        if (!presentEmailsLower.has(k.toLowerCase())) {
          byUser[k] = { email:k, modelBreakdown:{}, productBreakdown:{}, totalSpendUSD:0, totalPromptTokens:0, totalCompletionTokens:0, totalRequests:0 };
        }
      });

      const allUsers = Object.values(byUser);
      if (codeRow && codeRow.email) {
        const codeUserKey = lowerEmailToKey[codeRow.email.toLowerCase()];
        const codeTargetUser = allUsers.find(u => u.email?.toLowerCase() === codeUserKey?.toLowerCase());
        if (codeTargetUser) {
          codeTargetUser.totalSpendUSD += codeRow.spendUsd || 0;
          if (codeRow.totalInputTokens != null && codeRow.totalOutputTokens != null) {
            codeTargetUser.totalPromptTokens += codeRow.totalInputTokens;
            codeTargetUser.totalCompletionTokens += codeRow.totalOutputTokens;
          } else if (codeRow.totalTokens) {
            codeTargetUser.totalPromptTokens += codeRow.totalTokens;
          }
          codeTargetUser.codeSpendUSD = codeRow.spendUsd || 0;
          codeTargetUser.codeTokens = codeRow.totalTokens || 0;
          codeTargetUser.codeCsvLines = codeRow.codeLines || 0;
          Object.entries(codeRow.modelBreakdown || {}).forEach(([tier, v]) => {
            if (!codeTargetUser.modelBreakdown[tier]) codeTargetUser.modelBreakdown[tier] = { spend:0, tokens:0, requests:0 };
            codeTargetUser.modelBreakdown[tier].tokens += v.tokens || 0;
            codeTargetUser.modelBreakdown[tier].spend  += v.spend || 0;
          });
        }
      }
      const activeUsers = allUsers.filter(u => u.totalRequests > 0);
      const orgAvgTokens = activeUsers.length > 0
        ? activeUsers.reduce((s,u) => s + u.totalPromptTokens + u.totalCompletionTokens, 0) / activeUsers.length
        : 1;

      return allUsers.map(u => {
        const mapKey = lowerEmailToKey[u.email.toLowerCase()];
        const info = mapKey ? usersMap[mapKey] : null;
        const emailKey = mapKey || u.email;
        const totalTokens = u.totalPromptTokens + u.totalCompletionTokens;
        const opusSpend = u.modelBreakdown["Opus"]?.spend || 0;
        const opusPct = u.totalSpendUSD > 0 ? (opusSpend / u.totalSpendUSD) * 100 : 0;
        const surfaceCount = Object.keys(u.productBreakdown).length;
        const tokenVolumeScore = Math.min(100, (totalTokens / orgAvgTokens) * 50);
        const surfaceDiversityScore = Math.min(100, surfaceCount * 20);
        const recencyScore = u.totalRequests > 0 ? 100 : 0;
        const spendSignal = tokenVolumeScore * 0.5 + surfaceDiversityScore * 0.3 + recencyScore * 0.2;

        const conv = b.convByEmail[emailKey] || {};
        const proj = b.projByEmail[emailKey] || {};
        const mem = b.memByEmail[emailKey] || {};
        const userMeta = b.userMetaByEmail[emailKey] || {};

        let fluencyScore;
        let fluencyFormula = "spend";
        if (b.hasBehaviorData) {
          const convSignal = computeConversationSignal(conv);
          const projSignal = computeProjectSignal(proj);
          const configSignal = computeConfigSignal(mem, userMeta);
          fluencyScore = spendSignal * 0.25 + convSignal * 0.4 + projSignal * 0.2 + configSignal * 0.15;
          fluencyFormula = "multi";
        } else {
          fluencyScore = spendSignal;
        }
        const fluencyTier = fluencyScore >= 70 ? 1 : fluencyScore >= 40 ? 2 : fluencyScore >= 10 ? 3 : 4;
        const spendLimit = resolveSpendLimit(u.email);
        const spendAUD = u.totalSpendUSD * audRate;
        const spendUtilisation = spendLimit ? (spendAUD / spendLimit) * 100 : null;
        let entity = info?.entity;
        if (!entity) {
          if (u.email.toLowerCase().includes("frankadvisory")) entity = "Frank Advisory";
          else if (u.email.toLowerCase().includes("franklaw")) entity = "Frank Law";
          else entity = "Unknown Entity";
        }
        const seatTier = seatTierMap[emailKey] || info?.seatTier || "Standard";
        return {
          email: u.email, name: info?.name || u.email, entity, isBenchmark: info?.isBenchmark || false,
          totalSpendUSD: u.totalSpendUSD, totalSpendAUD: spendAUD,
          totalPromptTokens: u.totalPromptTokens, totalCompletionTokens: u.totalCompletionTokens,
          totalTokens, totalRequests: u.totalRequests,
          avgTokensPerRequest: u.totalRequests > 0 ? totalTokens / u.totalRequests : 0,
          modelBreakdown: u.modelBreakdown, productBreakdown: u.productBreakdown,
          opusPct, surfaceCount, fluencyScore, fluencyTier, fluencyFormula,
          spendLimit: spendLimit ?? null, spendUtilisation,
          seatTier,
          behavior: { conv, proj, mem },
          codeSpendUSD: u.codeSpendUSD || 0,
          codeTokens: u.codeTokens || 0,
          codeCsvLines: u.codeCsvLines || 0,
        };
      }).sort((a,b) => b.totalTokens - a.totalTokens);
    }

    function isAllowedDashboardEmail(email) {
      if (!email || typeof email !== "string") return false;
      const e = email.trim().toLowerCase();
      return e.endsWith("@frankadvisory.com.au") || e.endsWith("@franklaw.com.au");
    }

    function groupPeriodUsersRows(flatRows) {
      const byPid = {};
      for (const r of flatRows || []) {
        const pid = r.period_id;
        if (!byPid[pid]) byPid[pid] = { periods: r.periods, rows: [] };
        byPid[pid].rows.push(r);
      }
      return Object.keys(byPid).sort(
        (a, b) => new Date(byPid[a].periods?.created_at || 0) - new Date(byPid[b].periods?.created_at || 0)
      ).map(pid => ({ pid, periods: byPid[pid].periods, rows: byPid[pid].rows }));
    }

    function buildTrendSeriesFromGroups(groups, totalSeats) {
      return groups.map(({ periods: meta, rows: urows }) => {
        const active = urows.filter(u => (u.total_requests || 0) > 0);
        const adoptionPct = totalSeats > 0 ? (active.length / totalSeats) * 100 : 0;
        const avgFluency = active.length > 0
          ? active.reduce((s, u) => s + (Number(u.fluency_score) || 0), 0) / active.length
          : 0;
        const label = meta?.label
          || (meta?.date_from && meta?.date_to ? `${meta.date_from} → ${meta.date_to}` : String(meta?.created_at || "").slice(0, 10));
        return { label, adoptionPct, avgFluency };
      });
    }

    function buildUserSpendTrendMapFromGroups(groups) {
      const out = {};
      for (const { periods: meta, rows } of groups) {
        const label = meta?.label
          || (meta?.date_from && meta?.date_to ? `${meta.date_from} → ${meta.date_to}` : String(meta?.created_at || "").slice(0, 10));
        for (const u of rows) {
          if (!out[u.email]) out[u.email] = [];
          out[u.email].push({ label, spendUsd: Number(u.total_spend_usd) || 0 });
        }
      }
      return out;
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────────

    const fmt      = n => (n == null || isNaN(n)) ? "0" : n.toLocaleString(undefined, { maximumFractionDigits:0 });
    const fmtDec   = (n,d=1) => (n == null || isNaN(n)) ? "0" : (+n).toFixed(d);
    const fmtUSD   = n => `$${fmtDec(n||0,2)}`;
    const fmtAUD   = n => `A$${fmtDec(n||0,2)}`;
    const fmtTokens = n => {
      if (!n) return "0";
      if (n >= 1e9) return `${fmtDec(n/1e9,1)}B`;
      if (n >= 1e6) return `${fmtDec(n/1e6,1)}M`;
      if (n >= 1e3) return `${fmtDec(n/1e3,1)}K`;
      return `${n}`;
    };

    function PinGate({ onUnlock }) {
      const [pin, setPin] = useState("");

    function formatReportingPeriod(rawRows, dateRange) {
      if (!rawRows) {
        return { tone: "demo", line: "Demo / sample data — not tied to a live Anthropic export period." };
      }
      const parts = dateRange && dateRange !== "Unknown period" ? String(dateRange).match(/(\d{4}-\d{2}-\d{2})/g) : null;
      if (parts && parts.length === 2) {
        const dA = new Date(parts[0] + "T12:00:00Z");
        const dB = new Date(parts[1] + "T12:00:00Z");
        const start = dA <= dB ? dA : dB;
        const end = dA <= dB ? dB : dA;
        const inclusiveDays = Math.max(1, Math.floor((end.getTime() - start.getTime()) / 86400000) + 1);
        const opts = { day: "numeric", month: "short", year: "numeric" };
        return {
          tone: "live",
          line: `${start.toLocaleDateString("en-AU", opts)} — ${end.toLocaleDateString("en-AU", opts)} · ${inclusiveDays} days (inclusive)`,
        };
      }
      return { tone: "unknown", line: "Unknown — CSV filename did not include start and end dates (YYYY-MM-DD)." };
    }

    function spotlightCategories(users) {
      const spots = [];
      for (const { re, label } of COACHING_KEYWORDS) {
        let best = null, bestN = 0;
        for (const u of users) {
          const names = u.behavior?.conv?.names || [];
          const n = names.filter(nm => re.test(String(nm))).length;
          if (n > bestN) { bestN = n; best = u; }
        }
        if (best && bestN > 0) spots.push({ label, name: best.name, n: bestN });
      }
      return spots.slice(0, 5);
    }

    function getCoachingCopy(user) {
      const positives = [];
      const actions = [];
      const conv = user.behavior?.conv || {};
      const proj = user.behavior?.proj || {};
      const mem = user.behavior?.mem || {};
      const lastMs = conv.lastUpdate && conv.lastUpdate.getTime ? conv.lastUpdate.getTime() : (conv.lastUpdate ? new Date(conv.lastUpdate).getTime() : null);
      const daysSince = lastMs ? (Date.now() - lastMs) / 86400000 : null;

      if ((conv.count||0) >= 20) positives.push(`Strong Claude.ai habit — ${conv.count} conversations in this export.`);
      else if ((conv.count||0) >= 5) positives.push(`Active on Claude.ai — ${conv.count} conversations captured.`);
      else if ((conv.count||0) >= 1) positives.push(`Claude.ai export shows ${conv.count} conversation(s) — good foundation to build on.`);

      if ((conv.avgDepth||0) >= 6) positives.push(`You work iteratively — ~${fmtDec(conv.avgDepth,1)} messages per conversation on average.`);
      if ((proj.count||0) >= 1 && (proj.customPrompts||0) >= 1) positives.push("Projects with custom prompts — structured, repeatable workflows.");
      else if ((proj.count||0) >= 1) positives.push(`Using ${proj.count} project(s) to organise context.`);

      if ((mem.memoryLen||0) > 0) positives.push("Memory configured — less re-explaining each session.");

      if (user.surfaceCount >= 3 && user.totalRequests > 0) positives.push(`${user.surfaceCount} product surfaces in team usage data — nice breadth.`);

      if (user.opusPct < 50 && user.totalRequests > 0) positives.push(`Efficient model mix — ${fmtDec(100-user.opusPct,0)}% of spend off Opus.`);

      while (positives.length < 2) positives.push("Every expert was once a beginner — small weekly experiments add up.");

      if ((proj.count||0) === 0 && user.totalRequests > 0) actions.push("Create a Project for a recurring workflow so instructions and files stay in one place.");
      if ((mem.memoryLen||0) === 0 && user.totalRequests > 0) actions.push("Add concise Memory bullets (role, preferences) to speed up every new chat.");
      if ((conv.avgDepth||0) > 0 && (conv.avgDepth||0) < 2.5 && (conv.count||0) > 0) actions.push("Try multi-turn refinement: one improvement per message instead of one-shot prompts.");
      if (user.surfaceCount <= 1 && user.totalRequests > 0) actions.push("Try another surface where it fits (Cowork for long docs, Research for synthesis).");
      if (user.opusPct > 70 && user.totalRequests > 0) actions.push("Shift routine drafting to Sonnet; keep Opus for judgement-heavy work only.");
      if (daysSince != null && daysSince > 7 && user.totalRequests > 0) actions.push("No Claude.ai activity in the last week in this export — even a quick task keeps momentum.");

      while (actions.length < 2) actions.push("Pick one task to template this week; reuse the prompt next time.");

      const encouragement = user.fluencyTier <= 2
        ? "Solid momentum — consider sharing one playbook with a teammate."
        : "Small upgrades compound — one focused habit for seven days.";

      return { positives: positives.slice(0, 3), actions: actions.slice(0, 3), encouragement };
    }

          org_sonnet_pct:           totalUSD>0?(sonnetUSD/totalUSD)*100:0,
          org_haiku_pct:            totalUSD>0?(haikuUSD/totalUSD)*100:0,
          total_tokens:             users.reduce((s,u)=>s+u.totalTokens,0),
          avg_fluency_score:        active.length>0?active.reduce((s,u)=>s+u.fluencyScore,0)/active.length:0,
          org_fluency_score:        users.length>0?users.reduce((s,u)=>s+u.fluencyScore,0)/users.length:0,
        };
      }, [users, settings.totalSeats]);

      const handleData = useCallback((data, name, range) => {
        setRawRows(data); setFileName(name); setDateRange(range);
        const emails = [...new Set(data.map(r=>r.user_email))];
        const total  = data.reduce((s,r)=>s+(r.total_net_spend_usd||0),0);
        setDataInfo(`${range} · ${data.length} rows · ${emails.length} users · ${fmtAUD(total*settings.audRate)} total`);
      }, [settings.audRate]);

      const onIngestConvItems = useCallback((items, name) => {
        setConvItems(items); setConvSourceName(name || null);
      }, []);
      const onIngestProjItems = useCallback((items, name) => {
        setProjItems(items); setProjSourceName(name || null);
      }, []);
      const onIngestMemItems = useCallback((items, name) => {
        setMemItems(items); setMemSourceName(name || null);
      }, []);
      const onIngestUsersOverlay = useCallback((map, meta, name) => {
        setUuidOverlay(prev => ({ ...prev, ...map }));
        setUserMetaByEmail(prev => ({ ...prev, ...meta }));
        setUsersSourceName(name || null);
      }, []);
      const onIngestCodeRow = useCallback((row, name) => {
        setCodeData(row); setCodeFileName(name);
      }, []);

      const updateSettings = useCallback(patch => setSettings(s => ({ ...s, ...patch })), []);

      const refreshAud = useCallback(async () => {
        setAudLoading(true);
        try {
          const r = await fetch("https://api.frankfurter.app/latest?from=USD&to=AUD");
          const j = await r.json();
          const rate = j && j.rates && j.rates.AUD;
          if (rate && !isNaN(rate)) {
            setSettings(s => ({ ...s, audRate: rate }));
            setAudRateUpdated(new Date().toISOString());
          }
        } catch (e) { /* keep manual rate */ }
        setAudLoading(false);
      }, []);

      const handleSavePeriod = useCallback(async () => {
        if (!supabaseClient || !rawRows || !users.length) return;
        setSavingPeriod(true);
        setPeriodSaveMsg("");
        try {
          const date_from = dateRange ? dateRange.split(" to ")[0] || null : null;
          const date_to   = dateRange ? dateRange.split(" to ")[1] || null : null;
          const label     = (date_from && date_to) ? `${date_from} to ${date_to}` : "Manual snapshot";

          if (date_from && date_to) {
            const { data: existing } = await supabaseClient
              .from("periods")
              .select("id")
              .eq("date_from", date_from)
              .eq("date_to", date_to)
              .maybeSingle();
            if (existing) {
              await supabaseClient.from("periods").delete().eq("id", existing.id);
            }
          }

          const { data: period, error: insErr } = await supabaseClient
            .from("periods")
            .insert({ label, date_from: date_from || null, date_to: date_to || null })
            .select("id")
            .single();
          if (insErr || !period) throw insErr || new Error("Failed to insert period");

          const periodId = period.id;
          const periodUserRows = users.map(u => ({
            period_id:        periodId,
            email:            u.email,
            name:             u.name,
            entity:           u.entity,
            seat_tier:        u.seatTier,
            total_spend_usd:  u.totalSpendUSD,
            total_tokens:     u.totalTokens,
            total_requests:   u.totalRequests,
            opus_pct:         u.opusPct,
            fluency_score:    u.fluencyScore,
            fluency_tier:     u.fluencyTier,
            model_breakdown:  u.modelBreakdown,
            product_breakdown: u.productBreakdown,
            code_spend_usd:   u.codeSpendUSD || null,
            code_tokens:      u.codeTokens   || null,
          }));

          const { error: puErr } = await supabaseClient.from("period_users").insert(periodUserRows);
          if (puErr) throw puErr;

          // Build normalised breakdown rows for SQL analytics
          const modelBreakdownRows = [];
          const productBreakdownRows = [];
          for (const u of users) {
            for (const [modelClass, data] of Object.entries(u.modelBreakdown || {})) {
              if (data.spend > 0 || data.tokens > 0) {
                modelBreakdownRows.push({
                  period_id: periodId, email: u.email,
                  model_class: modelClass,
                  spend_usd: data.spend || 0, tokens: data.tokens || 0, requests: data.requests || 0,
                });
              }
            }
            for (const [product, data] of Object.entries(u.productBreakdown || {})) {
              if (data.spend > 0 || data.tokens > 0) {
                productBreakdownRows.push({
                  period_id: periodId, email: u.email,
                  product,
                  spend_usd: data.spend || 0, tokens: data.tokens || 0, requests: data.requests || 0,
                });
              }
            }
          }
          await Promise.all([
            modelBreakdownRows.length
              ? supabaseClient.from("period_model_breakdown").insert(modelBreakdownRows)
              : Promise.resolve(),
            productBreakdownRows.length
              ? supabaseClient.from("period_product_breakdown").insert(productBreakdownRows)
              : Promise.resolve(),
          ]);

          setTrendRefreshKey(k => k + 1);
          setPeriodSaveMsg("Period saved.");
          setTimeout(() => setPeriodSaveMsg(""), 3000);
        } catch (e) {
          setPeriodSaveMsg(`Save failed: ${e?.message || e}`);
          setTimeout(() => setPeriodSaveMsg(""), 6000);
        }
        setSavingPeriod(false);
      }, [supabaseClient, rawRows, users, dateRange]);

      // ── Initiative CRUD callbacks (row-level DB ops + local state) ───────────
      const handleInitiativeAdd = useCallback(async () => {
        const tempId = Date.now().toString();
        const newInit = { id: tempId, name: "New Initiative", owner: "", targetMetric: "active_users_count", targetValue: 0, lowerIsBetter: false, statusOverride: null };
        setInitiatives(p => [...p, newInit]);
        if (supabaseClient) {
          const { data } = await supabaseClient
            .from("initiatives")
            .insert({ name: "New Initiative", owner: null, target_metric: "active_users_count", target_value: 0, lower_is_better: false, sort_order: 999 })
            .select("id").single();
          if (data?.id) {
            setInitiatives(p => p.map(i => i.id === tempId ? { ...i, id: data.id } : i));
            return data.id;
          }
        }
        return tempId;
      }, [supabaseClient]);

      const handleInitiativeUpdate = useCallback((id, fields) => {
        setInitiatives(p => p.map(i => i.id === id ? { ...i, ...fields, targetValue: parseFloat(fields.targetValue) || 0 } : i));
        if (supabaseClient) {
          supabaseClient.from("initiatives").update({
            name: fields.name,
            owner: fields.owner || null,
            target_metric: fields.targetMetric,
            target_value: parseFloat(fields.targetValue) || 0,
            lower_is_better: fields.lowerIsBetter ?? false,
          }).eq("id", id).then(({ error }) => { if (error) console.warn("initiative update:", error); });
        }
      }, [supabaseClient]);

      const handleInitiativeDelete = useCallback((id) => {
        setInitiatives(p => p.filter(i => i.id !== id));
        if (supabaseClient) {
          supabaseClient.from("initiatives").delete().eq("id", id)
            .then(({ error }) => { if (error) console.warn("initiative delete:", error); });
        }
      }, [supabaseClient]);

      const updateLimit = (email,val) => setSpendOverrides(p=>({...p,[email]:val}));

      const reportingPeriod = useMemo(
        () => formatReportingPeriod(rawRows, dateRange),
        [rawRows, dateRange]
      );

      const periodAccent = reportingPeriod.tone === "live" ? COLOURS.accent : reportingPeriod.tone === "demo" ? "#3a4a7c" : "#94a3b8";
      const reportDateRange = dateRange;

      const hasBehaviorDataForModules = behavior.hasBehaviorData;

      const ingestHandlersStable = useMemo(() => ({
        onData: handleData,
        onConvItems: onIngestConvItems,
        onProjItems: onIngestProjItems,
        onMemItems: onIngestMemItems,
        onUsersOverlay: onIngestUsersOverlay,
        onCodeRow: onIngestCodeRow,
      }), [handleData, onIngestConvItems, onIngestProjItems, onIngestMemItems, onIngestUsersOverlay, onIngestCodeRow]);
      ingestHandlersRef.current = ingestHandlersStable;

      useEffect(() => {
        if (!persistToCloud || autoCloudIngestDoneRef.current) return undefined;
        let cancelled = false;
        const { supabase } = persistToCloud;
        const finish = () => {
          if (!cancelled) {
            autoCloudIngestDoneRef.current = true;
            bumpUploadsRefresh();
          }
        };
        (async () => {
          try {
            const { data: rows, error } = await supabase.from("uploads").select("*").order("uploaded_at", { ascending: false });
            if (cancelled) return;
            if (error || !rows?.length) {
              finish();
              return;
            }
            const latestByType = {};
            for (const r of rows) {
              if (!latestByType[r.file_type]) latestByType[r.file_type] = r;
            }
            // Order matters: spend CSV first; users.json before conversations/projects so UUID overlay resolves for behavior maps.
            const restoreOrder = ["anthropic-csv", "users", "conversations", "projects", "memories", "code-csv"];
            const restoreAttempts = [];
            for (const ft of restoreOrder) {
              const row = latestByType[ft];
              if (!row || cancelled) continue;
              const { data: blob, error: dErr } = await supabase.storage.from("uploads").download(row.storage_path);
              if (cancelled) break;
              if (dErr || !blob) {
                restoreAttempts.push({ ft, ok: false });
                console.warn("Cloud restore: could not download", ft, dErr);
                continue;
              }
              let text;
              try {
                text = await blob.text();
              } catch (e) {
                restoreAttempts.push({ ft, ok: false });
                console.warn("Cloud restore: could not read text for", ft, e);
                continue;
              }
              getIngestResult({ name: row.file_name }, text, ingestHandlersRef.current);
              restoreAttempts.push({ ft, ok: true });
            }
            if (restoreAttempts.filter(a => !a.ok).length) {
              console.warn("Cloud restore: some file types failed:", restoreAttempts.filter(a => !a.ok).map(f => f.ft));
            }
            finish();
          } catch (e) {
            console.warn("Auto-load cloud uploads:", e);
            finish();
          }
        })();
        return () => { cancelled = true; };
      }, [persistToCloud, bumpUploadsRefresh]);

      const storedUploadsForModule = useMemo(() => (
        persistToCloud ? {
          rows: uploadsList,
          loading: uploadsLoading,
          onRefresh: bumpUploadsRefresh,
        } : null
      ), [persistToCloud, uploadsList, uploadsLoading, bumpUploadsRefresh]);

      const module1Props = useMemo(() => ({
        onData: handleData,
        onSettings: updateSettings,
        settings,
        fileName,
        dataInfo,
        onConvItems: onIngestConvItems,
        onProjItems: onIngestProjItems,
        onMemItems: onIngestMemItems,
        onUsersOverlay: onIngestUsersOverlay,
        onCodeRow: onIngestCodeRow,
        convCount: convItems.length,
        projCount: projItems.length,
        memCount: memItems.length,
        codeLines: codeData ? codeData.codeLines : 0,
        codeUsageRowCount: codeData && codeData.usageRowCount ? codeData.usageRowCount : 0,
        codeFileName,
        convSourceName,
        projSourceName,
        memSourceName,
        usersSourceName,
        refreshAud,
        audLoading,
        audRateUpdated,
        persistToCloud,
        storedUploads: storedUploadsForModule,
        onSavePeriod: handleSavePeriod,
        savingPeriod,
        periodSaveMsg,
      }), [
        handleData,
        updateSettings,
        settings,
        fileName,
        dataInfo,
        onIngestConvItems,
        onIngestProjItems,
        onIngestMemItems,
        onIngestUsersOverlay,
        onIngestCodeRow,
        convItems.length,
        projItems.length,
        memItems.length,
        codeData,
        codeFileName,
        convSourceName,
        projSourceName,
        memSourceName,
        usersSourceName,
        refreshAud,
        audLoading,
        audRateUpdated,
        persistToCloud,
        storedUploadsForModule,
        handleSavePeriod,
        savingPeriod,
        periodSaveMsg,
      ]);

      return React.createElement("div", { style:{ fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif", background:"#f1f5f9", minHeight:"100vh", padding:24, color:COLOURS.bodyText } },
        React.createElement("div", { style:{ background:COLOURS.advisory, color:"#fff", borderRadius:10, padding:"20px 28px", marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12, borderLeft:`6px solid ${COLOURS.accent}` } },
          React.createElement("div", null,
            React.createElement("div", { style:{ fontSize:12, fontWeight:700, color:COLOURS.accent, letterSpacing:2, textTransform:"uppercase" } }, "The Frank Group"),
            React.createElement("div", { style:{ fontSize:22, fontWeight:800, letterSpacing:0.3 } }, "AI Governance Dashboard"),
            React.createElement("div", { style:{ fontSize:13, opacity:0.9, marginTop:4 } }, "Frank Advisory · Frank Law · Phase 2 preview")
          ),
          React.createElement("div", { style:{ textAlign:"right" } },
            !rawRows && React.createElement("div", { style:{ fontSize:11, background:"#3a4a7c", color:"#fff", padding:"4px 12px", borderRadius:9999 } }, "Demo mode — upload CSV to load real data"),
            rawRows && React.createElement("div", { style:{ fontSize:11, background:COLOURS.accent, color:"#1a1a1a", padding:"4px 12px", borderRadius:9999, fontWeight:700 } }, `Live: ${dateRange}`)
          )
        ),
        React.createElement("div", {
          style:{
            background:"#fff", border:"1px solid #e2e8f0", borderRadius:8, padding:"14px 20px", marginBottom:24,
            borderLeft:`4px solid ${periodAccent}`, boxShadow:"0 1px 2px rgba(15,23,42,0.06)",
          }
        },
          React.createElement("div", { style:{ fontSize:11, fontWeight:700, color:COLOURS.advisory, textTransform:"uppercase", letterSpacing:1.2, marginBottom:6 } }, "Reporting period"),
          React.createElement("div", { style:{ fontSize:16, fontWeight:700, color:COLOURS.bodyText, lineHeight:1.4 } }, reportingPeriod.line)
        ),
        React.createElement("div", { style:{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:"8px 8px 0 0", overflow:"hidden", marginTop:4 } },
          React.createElement(TabBar, { activeTab, onSelect: setActiveTab })
        ),
        React.createElement("div", { style:{ display:"flex", flexDirection:"column", gap:20 } },
          activeTab === "admin" && (
            adminUnlocked
              ? React.createElement(Module1, module1Props)
              : React.createElement(PinGate, { onUnlock: () => setAdminUnlocked(true) })
          ),
          activeTab === "dashboard" && React.createElement(React.Fragment, null,
            !rawRows && React.createElement("div", {
              style: {
                background: "#f5f3ff", border: `1px solid ${COLOURS.advisory}`,
                borderRadius: 8, padding: "16px 20px", margin: "20px 0 0",
                fontSize: 14, color: COLOURS.advisory, textAlign: "center",
              },
            },
              "No data loaded yet. Go to the ",
              React.createElement("strong", null, "Admin"),
              " tab to upload CSV files."
            ),
            React.createElement(Module2, { users, settings, metrics, hasBehaviorData: hasBehaviorDataForModules, trendSeries }),
            React.createElement(Module3, { users, metrics }),
            React.createElement(Module4, { users, onUpdateLimit:updateLimit, audRate: settings.audRate, readOnly: false, userSpendTrends }),
            React.createElement(Module5, { users }),
            React.createElement(Module7InitiativeTracker, { initiatives, onAddInitiative: handleInitiativeAdd, onUpdateInitiative: handleInitiativeUpdate, onDeleteInitiative: handleInitiativeDelete, metrics, readOnly: false }),
            React.createElement(Module8ReportGenerator, { users, metrics, initiatives, settings, dateRange: reportDateRange, hasBehaviorData: hasBehaviorDataForModules, runtimeCfg }),
            React.createElement(Module9Coaching, { users, metrics, hasBehaviorData: hasBehaviorDataForModules }),
            React.createElement(Module6, { users, settings, dateRange: reportDateRange })
          )
        ),
        React.createElement("div", { style:{ textAlign:"center", color:"#9ca3af", fontSize:11, marginTop:24, paddingBottom:12 } }, "Frank Group AI Governance Dashboard · Phase 2 · Optional Supabase persistence; Module 8 optional AI narrative uses OpenRouter (paste, or key from Railway / dashboard-config.json; aggregated metrics only); all other processing is client-side")
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
})();
  </script>
</body>
</html>
